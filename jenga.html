        const container = document.getElementById('challenges-container');
        const fallContainer = document.getElementById('fall-penalties-container');
        const fallWrapper = document.getElementById('fall-penalties-wrapper');

        function renderFallPenalties(filterColor = 'all') {
            fallContainer.innerHTML = '';
            let count = 0;
            fallPenalties.forEach(c => {
                if (filterColor === 'all' || c.color === filterColor) {
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-lg bg-black border border-gray-800 flex flex-col justify-between`;
                    card.innerHTML = `
                        <div>
                            <span class="text-xs font-bold uppercase ${c.glow}">${c.cat}: ${c.title}</span>
                            <p class="text-sm font-medium mt-2 text-gray-300 leading-tight">${c.text}</p>
                        </div>
                    `;
                    fallContainer.appendChild(card);
                    count++;
                }
            });
            fallWrapper.style.display = count > 0 ? 'block' : 'none';
        }

        function renderChallenges(filterColor = 'all') {
            container.innerHTML = '';
            challenges.forEach((c, index) => {
                if (filterColor === 'all' || c.color === filterColor) {
                    const card = document.createElement('div');
                    card.className = `p-6 rounded-lg bg-gray-900 border-l-8 ${c.border} flex flex-col justify-between transition-all hover:bg-gray-800`;
                    card.innerHTML = `
                        <div class="mb-4">
                            <span class="text-xs font-bold uppercase ${c.glow}">${c.cat}</span>
                            <p class="text-lg font-medium mt-2 leading-tight">${c.text}</p>
                        </div>
                        <div class="text-right text-gray-700 text-sm font-bold">#${index + 1}</div>
                    `;
                    container.appendChild(card);
                }
            });
        }

        function filter(color) {
            renderChallenges(color);
            renderFallPenalties(color);
        }

        function showRandom() {
            const modal = document.getElementById('random-modal');
            const modalContent = document.getElementById('modal-content');
            const catEl = document.getElementById('modal-category');
            const textEl = document.getElementById('modal-text');
            
            const random = challenges[Math.floor(Math.random() * challenges.length)];
            
            catEl.innerText = random.cat;
            catEl.className = `text-sm uppercase tracking-widest mb-4 font-bold ${random.glow}`;
            textEl.innerText = random.text;
            
            modalContent.className = `max-w-lg w-full p-10 rounded-2xl text-center relative bg-black border-4 ${random.border} shadow-[0_0_50px_rgba(0,0,0,0.5)]`;
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('random-modal').style.display = 'none';
        }

        function downloadPDF() {
            const btn = document.getElementById('download-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = "Procesando PDF... espera unos segundos";

            // Creamos un contenedor virtual que no se ve afectado por el scroll
            const tempContainer = document.createElement('div');
            tempContainer.style.backgroundColor = '#050505'; // Forzar fondo negro raíz

            const colors = [
                { id: 'rojo', name: 'Rojo: Spicy & Pasión', hex: '#ff0055' },
                { id: 'amarillo', name: 'Amarillo: Mental & Trivia', hex: '#ffcc00' },
                { id: 'verde', name: 'Verde: Acción & Diversión', hex: '#33ff00' },
                { id: 'azul', name: 'Azul: Confesiones', hex: '#00ccff' },
                { id: 'morado', name: 'Morado: Nuestra Historia', hex: '#cc00ff' },
                { id: 'rosa', name: 'Rosa: Sorpresas y Castigos', hex: '#ff00cc' }
            ];

            const pdfStyles = `
                <style>
                    .pdf-section {
                        background-color: #050505 !important;
                        padding: 20px 30px;
                        box-sizing: border-box;
                        width: 100%;
                    }
                    .pdf-header {
                        text-align: center;
                        font-family: 'Orbitron', sans-serif;
                        text-transform: uppercase;
                        margin-bottom: 30px;
                        padding-top: 10px;
                    }
                    .pdf-item {
                        padding: 15px;
                        background: #111111 !important;
                        border-radius: 8px;
                        margin-bottom: 12px;
                        border-left-width: 8px;
                        border-left-style: solid;
                        display: block;
                        /* SOLUCIÓN 1: Evita que la caja se corte a la mitad entre páginas */
                        page-break-inside: avoid !important;
                        break-inside: avoid !important;
                    }
                    .pdf-num {
                        font-size: 11px;
                        font-weight: bold;
                        text-transform: uppercase;
                        margin-bottom: 5px;
                        display: block;
                    }
                    .pdf-text {
                        font-size: 15px;
                        color: #eeeeee;
                        margin: 0;
                        font-family: 'Rajdhani', sans-serif;
                    }
                    /* SOLUCIÓN 2: Salto de página forzado solo antes de las nuevas secciones */
                    .page-break { page-break-before: always !important; padding-top: 500px !important;}
                </style>
            `;

            tempContainer.innerHTML = pdfStyles;

            colors.forEach((colorObj, index) => {
                const section = document.createElement('div');
                // Aplicamos el salto de página a todas las secciones menos a la primera
                section.className = `pdf-section ${index > 0 ? 'page-break' : ''}`;
                
                const filtered = challenges.filter(c => c.color === colorObj.id);
                
                section.innerHTML = `
                    <div class="pdf-header">
                        <h1 style="color: ${colorObj.hex}; font-size: 32px; margin: 0;">${colorObj.name}</h1>
                        <hr style="border: 1px solid ${colorObj.hex}; margin-top: 10px; opacity: 0.3;">
                    </div>
                    <div style="display: flex; flex-direction: column;">
                        ${filtered.map((c, i) => `
                            <div class="pdf-item" style="border-left-color: ${colorObj.hex};">
                                <span class="pdf-num" style="color: ${colorObj.hex};">Reto #${i+1}</span>
                                <p class="pdf-text">${c.text}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
                tempContainer.appendChild(section);
            });

            // --- PÁGINA EXTRA: CASTIGOS POR DERRIBO ---
            const fallPage = document.createElement('div');
            fallPage.className = 'pdf-section page-break';
            fallPage.innerHTML = `
                <div class="pdf-header">
                    <h1 style="color: #ff0055; font-size: 32px; margin: 0; text-shadow: 0 0 10px #ff0055;">💥 SI LA TORRE CAE 💥</h1>
                    <p style="color: #aaaaaa; font-size: 14px; text-transform: uppercase; margin-top: 5px;">El castigo depende del color del bloque derribado</p>
                    <hr style="border: 1px solid #ff0055; margin-top: 15px; opacity: 0.5;">
                </div>
                <div style="display: flex; flex-direction: column;">
                    ${fallPenalties.map(c => `
                        <div class="pdf-item" style="border-left-color: ${c.hex}; margin-bottom: 15px;">
                            <span class="pdf-num" style="color: ${c.hex}; font-size: 14px;">${c.cat} - ${c.title}</span>
                            <p class="pdf-text" style="font-size: 16px;">${c.text}</p>
                        </div>
                    `).join('')}
                </div>
            `;
            tempContainer.appendChild(fallPage);

            const opt = {
                margin:       0,
                filename:     'Jenga_Neon_Night_Full.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 2, 
                    backgroundColor: '#050505', 
                    useCORS: true,
                    scrollY: 0, // Fuerza a la librería a no capturar el scroll de la ventana
                    scrollX: 0
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                // SOLUCIÓN 3: Activa el motor de la librería para que lea el "page-break-inside"
                pagebreak:    { mode: ['css', 'legacy'] }
            };

            // Ejecutamos y al terminar devolvemos el texto original al botón
            html2pdf().set(opt).from(tempContainer).save().then(() => {
                btn.innerHTML = originalText;
            });
        }

        renderChallenges();
        renderFallPenalties();
    </script>
