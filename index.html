<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenga Neon Night - Modo Parejas y Amigos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff0055;
            --neon-yellow: #ffcc00;
            --neon-green: #33ff00;
            --neon-blue: #00ccff;
            --neon-purple: #cc00ff;
            --neon-pink: #ff00cc;
            
            /* Variables de fondo (Cyberpunk Grid) */
            --bg-color: #050505;
            --grid-color: rgba(0, 204, 255, 0.05);
            --vignette-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            box-shadow: inset 0 0 150px var(--vignette-color);
            transition: background-color 0.8s ease, box-shadow 0.8s ease;
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Estilos Modo Hardcore */
        body.hardcore-mode {
            --bg-color: #110000;
            --grid-color: rgba(255, 0, 85, 0.08);
            --vignette-color: rgba(255, 0, 0, 0.2);
        }

        h1, h2, .neon-text {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Utilidades Neón */
        .neon-border-red { border: 2px solid var(--neon-red); box-shadow: 0 0 10px var(--neon-red), inset 0 0 5px var(--neon-red); }
        .neon-border-yellow { border: 2px solid var(--neon-yellow); box-shadow: 0 0 10px var(--neon-yellow), inset 0 0 5px var(--neon-yellow); }
        .neon-border-green { border: 2px solid var(--neon-green); box-shadow: 0 0 10px var(--neon-green), inset 0 0 5px var(--neon-green); }
        .neon-border-blue { border: 2px solid var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue), inset 0 0 5px var(--neon-blue); }
        .neon-border-purple { border: 2px solid var(--neon-purple); box-shadow: 0 0 10px var(--neon-purple), inset 0 0 5px var(--neon-purple); }
        .neon-border-pink { border: 2px solid var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink), inset 0 0 5px var(--neon-pink); }

        .glow-red { text-shadow: 0 0 10px var(--neon-red); color: var(--neon-red); }
        .glow-yellow { text-shadow: 0 0 10px var(--neon-yellow); color: var(--neon-yellow); }
        .glow-green { text-shadow: 0 0 10px var(--neon-green); color: var(--neon-green); }
        .glow-blue { text-shadow: 0 0 10px var(--neon-blue); color: var(--neon-blue); }
        .glow-purple { text-shadow: 0 0 10px var(--neon-purple); color: var(--neon-purple); }
        .glow-pink { text-shadow: 0 0 10px var(--neon-pink); color: var(--neon-pink); }

        /* Botón Aleatorio */
        .btn-neon {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }
        .btn-neon:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Modales y Overlays */
        .random-overlay {
            background: rgba(0, 0, 0, 0.90);
            backdrop-filter: blur(10px);
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .filter-active {
            box-shadow: 0 0 15px currentColor;
            transform: scale(1.05);
        }

        /* --- NUEVAS ANIMACIONES --- */
        
        /* 1. Flicker Text (Letrero Neón) */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { text-shadow: 0 0 20px #fff, 0 0 30px var(--neon-blue); opacity: 1; }
            20%, 24%, 55% { text-shadow: none; opacity: 0.5; }
        }
        .flicker-text { animation: flicker 5s infinite alternate; }
        body.hardcore-mode .flicker-text { animation: none; text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055; color: #fff; }

        /* 2. Temblor Pantalla (Hardcore Activate) */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-3px, -2px) rotate(-1deg); }
            20%, 40%, 60%, 80% { transform: translate(3px, 2px) rotate(1deg); }
        }
        .shake-animation { animation: shake 0.4s ease-in-out; }

        /* 3. Tarjetas: Cascada de Entrada y Hover 3D */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .card-hover {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, background-color 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-8px) scale(1.02);
            z-index: 10;
        }

        /* 4. Partículas Confeti */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            animation: explode 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            z-index: 0;
        }
        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); opacity: 0; }
        }

        /* 5. Haz de Luz (Botón Aleatorio) */
        @keyframes sweep {
            0% { transform: translateX(-100%) skewX(-15deg); }
            100% { transform: translateX(200%) skewX(-15deg); }
        }

        /* 6. Temporizador SVG */
        .timer-circle {
            transition: stroke-dashoffset 1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>

    <script>
        // =================================================================================
        // VARIABLES GLOBALES Y AUDIO
        // =================================================================================
        let currentFilter = 'all';
        let isHardcore = false;
        let currentTheme = 'couples'; // 'couples' o 'friends'
        
        let players = [];
        let currentPlayerIndex = 0;
        
        let currentTimerSeconds = 0;
        let timerInterval = null;

        // Motor de Audio (Web Audio API)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        const SFX = {
            resume: () => { if(audioCtx.state === 'suspended') audioCtx.resume(); },
            playTick: () => {
                SFX.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            },
            playWin: () => {
                SFX.resume();
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => { // Acorde Do Mayor Cmaj7
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0, audioCtx.currentTime + (i * 0.08));
                    gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + (i * 0.08) + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (i * 0.08) + 1.5);
                    osc.start(audioCtx.currentTime + (i * 0.08));
                    osc.stop(audioCtx.currentTime + (i * 0.08) + 1.5);
                });
            },
            playHardcore: () => {
                SFX.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 1.5);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
                osc.start(); osc.stop(audioCtx.currentTime + 1.5);
            },
            playAlarm: () => {
                SFX.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                for(let i=0; i<8; i++) {
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.2);
                    gain.gain.setValueAtTime(0, audioCtx.currentTime + i*0.2 + 0.1);
                }
                osc.start(); osc.stop(audioCtx.currentTime + 1.6);
            }
        };

                bgDiv.classList.add('opacity-0');
                
                fallWrapper.classList.remove('border-red-500', 'bg-red-900/20');
                fallWrapper.classList.add('border-red-900/50', 'bg-gray-900/40');
            }
            updateData();
        }

        // =================================================================================
        // RENDERIZADO Y UI CON EFECTOS
        // =================================================================================
        function renderFallPenalties(filterColor = 'all') {
            fallContainer.innerHTML = '';
            let count = 0;
            fallPenalties.forEach((c, index) => {
                if (filterColor === 'all' || c.color === filterColor) {
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-lg bg-black border border-gray-800 flex flex-col justify-between card-hover opacity-0`;
                    card.style.animation = `slideUpFade 0.5s ease forwards ${count * 0.05}s`;
                    card.innerHTML = `
                        <div>
                            <span class="text-xs font-bold uppercase ${c.glow}">${c.cat}: ${c.title}</span>
                            <p class="text-sm font-medium mt-2 text-gray-300 leading-tight">${c.text}</p>
                        </div>
                    `;
                    fallContainer.appendChild(card);
                    count++;
                }
            });
            fallWrapper.style.display = count > 0 ? 'block' : 'none';
        }

        function renderChallenges(filterColor = 'all') {
            container.innerHTML = '';
            let count = 0;
            challenges.forEach((c, index) => {
                if (filterColor === 'all' || c.color === filterColor) {
                    const card = document.createElement('div');
                    card.className = `p-6 rounded-lg bg-gray-900 border-l-8 ${c.border} flex flex-col justify-between card-hover opacity-0`;
                    card.style.animation = `slideUpFade 0.5s ease forwards ${count * 0.05}s`;
                    card.innerHTML = `
                        <div class="mb-4">
                            <span class="text-xs font-bold uppercase ${c.glow}">${c.cat}</span>
                            <p class="text-lg font-medium mt-2 leading-tight">${c.text}</p>
                        </div>
                        <div class="text-right text-gray-700 text-sm font-bold">#${index + 1}</div>
                    `;
                    container.appendChild(card);
                    count++;
                }
            });
        }

        function filter(color, btnElement) {
            currentFilter = color;
            renderChallenges(color);
            renderFallPenalties(color);

            if(btnElement) {
                const buttons = document.querySelectorAll('.filter-btn');
                buttons.forEach(btn => btn.classList.remove('filter-active'));
                btnElement.classList.add('filter-active');
            }
        }

        // =================================================================================
        // GESTIÓN DE JUGADORES Y TURNOS
        // =================================================================================
        function addPlayerInline() {
            const input = document.getElementById('inline-player-input');
            const name = input.value.trim();
            if (name && !players.includes(name)) {
                players.push(name);
                input.value = '';
                renderPlayersInline();
            }
        }

        function removePlayerInline(name) {
            players = players.filter(p => p !== name);
            if (currentPlayerIndex >= players.length) currentPlayerIndex = 0;
            renderPlayersInline();
        }

        function renderPlayersInline() {
            const list = document.getElementById('inline-players-list');
            const turnDisplay = document.getElementById('current-turn-display');
            const skipBtn = document.getElementById('skip-turn-btn');

            if (players.length === 0) {
                list.innerHTML = '<span class="text-gray-600 text-sm italic">Añade nombres para habilitar los turnos...</span>';
                turnDisplay.innerHTML = '---';
                turnDisplay.classList.remove('text-[#00ccff]', 'drop-shadow-[0_0_10px_rgba(0,204,255,0.8)]');
                turnDisplay.classList.add('text-gray-600');
                skipBtn.classList.add('hidden');
                return;
            }

            list.innerHTML = '';
            players.forEach((p, index) => {
                const isActive = index === currentPlayerIndex;
                const activeClass = isActive ? 'border-[#00ccff] bg-[#00ccff]/20 shadow-[0_0_8px_rgba(0,204,255,0.4)]' : 'border-gray-700 bg-gray-800';
                list.innerHTML += `
                    <div class="flex items-center gap-1 ${activeClass} border px-3 py-1 rounded-md transition-all">
                        <span class="text-white text-xs font-bold uppercase tracking-wider">${p}</span>
                        <button onclick="removePlayerInline('${p}')" class="text-red-500 hover:text-red-300 font-bold ml-2 text-sm leading-none">&times;</button>
                    </div>
                `;
            });

            // Update Turn Display
            const currentPlayer = players[currentPlayerIndex];
            turnDisplay.innerHTML = currentPlayer;
            turnDisplay.classList.remove('text-gray-600');
            turnDisplay.classList.add('text-[#00ccff]', 'drop-shadow-[0_0_10px_rgba(0,204,255,0.8)]');
            skipBtn.classList.remove('hidden');
        }

        function nextTurn() {
            if (players.length > 0) {
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
                renderPlayersInline();
            }
        }

        function personalizeChallengeText(text) {
            if (players.length === 0) return { newText: text, active: '' };
            
            const activePlayer = players[currentPlayerIndex];
            let otherPlayers = players.filter(p => p !== activePlayer);
            let randomOther = otherPlayers.length > 0 ? otherPlayers[Math.floor(Math.random() * otherPlayers.length)] : activePlayer;

            const regex = /(tu pareja|al jugador a tu izquierda|al jugador a tu derecha|a la persona a tu izquierda|a la persona a tu derecha|la persona a tu izquierda|la persona a tu derecha|alguien del grupo|a alguien)/gi;
            const newText = text.replace(regex, `<span class="text-[#ffcc00] font-bold drop-shadow-[0_0_5px_rgba(255,204,0,0.8)]">${randomOther}</span>`);

            return { newText, active: activePlayer };
        }

        // =================================================================================
        // RULETA ALEATORIA Y CONFETI
        // =================================================================================
        let rouletteInterval;

        function showRandom() {
            SFX.resume(); // Asegurar que el contexto de audio despierta al hacer clic
            const modal = document.getElementById('random-modal');
            const modalContent = document.getElementById('random-content') || document.getElementById('modal-content');
            const catEl = document.getElementById('modal-category');
            const textEl = document.getElementById('modal-text');
            const closeBtn = document.getElementById('modal-close-btn');
            const timerBtn = document.getElementById('timer-trigger-btn');
            const particlesContainer = document.getElementById('particles-container');
            const activePlayerEl = document.getElementById('active-player-text');
            
            const availableChallenges = currentFilter === 'all' 
                ? challenges 
                : challenges.filter(c => c.color === currentFilter);
            
            if(availableChallenges.length === 0) return;

            // Resetear estilos
            particlesContainer.innerHTML = '';
            closeBtn.classList.add('opacity-0', 'pointer-events-none');
            timerBtn.classList.add('hidden');
            activePlayerEl.classList.add('hidden');
            modal.style.display = 'flex';
            setTimeout(() => modal.style.opacity = '1', 10);
            
            modalContent.className = "max-w-lg w-full p-10 rounded-2xl text-center relative shadow-2xl transition-all duration-100 scale-95 bg-gray-900 border-4 border-gray-700";

            let elapsed = 0;
            const duration = 1500; // 1.5s de ruleta
            const intervalTime = 80;

            // Animar el sonido/texto de ruleta
            clearInterval(rouletteInterval);
            rouletteInterval = setInterval(() => {
                SFX.playTick(); // Sonido de ruleta
                const tempRandom = availableChallenges[Math.floor(Math.random() * availableChallenges.length)];
                catEl.innerText = tempRandom.cat;
                catEl.className = `text-sm uppercase tracking-widest mb-4 font-bold ${tempRandom.glow}`;
                textEl.innerText = tempRandom.text;
                modalContent.className = `max-w-lg w-full p-10 rounded-2xl text-center relative shadow-[0_0_20px_rgba(255,255,255,0.1)] transition-all duration-75 scale-[0.98] bg-black border-4 ${tempRandom.border}`;

                elapsed += intervalTime;
                
                if (elapsed >= duration) {
                    clearInterval(rouletteInterval);
                    finalizeRandomPick(availableChallenges, catEl, textEl, modalContent, closeBtn, timerBtn, activePlayerEl);
                }
            }, intervalTime);
        }

        function finalizeRandomPick(availableChallenges, catEl, textEl, modalContent, closeBtn, timerBtn, activePlayerEl) {
            SFX.playWin(); // Sonido de éxito
            const finalRandom = availableChallenges[Math.floor(Math.random() * availableChallenges.length)];
            
            catEl.innerText = finalRandom.cat;
            catEl.className = `text-sm uppercase tracking-widest mb-4 font-bold ${finalRandom.glow}`;
            
            // Lógica de nombres dinámicos
            const personalized = personalizeChallengeText(finalRandom.text);
            textEl.innerHTML = personalized.newText;

            if (personalized.active) {
                activePlayerEl.innerHTML = `¡Te toca, <span class="text-[#00ccff] drop-shadow-[0_0_10px_rgba(0,204,255,0.8)]">${personalized.active}</span>!`;
                activePlayerEl.classList.remove('hidden');
            }
            
            // Lógica de detección de tiempo
            const timeMatch = finalRandom.text.match(/(\d+)\s*(segundo|segundos|minuto|minutos)/i);
            if (timeMatch) {
                let amount = parseInt(timeMatch[1]);
                if (timeMatch[2].toLowerCase().startsWith('minuto')) amount *= 60;
                currentTimerSeconds = amount;
                timerBtn.innerText = `⏱️ Iniciar Tiempo (${currentTimerSeconds}s)`;
                timerBtn.classList.remove('hidden');
            }
            
            // Efecto POP final
            modalContent.className = `max-w-lg w-full p-10 rounded-2xl text-center relative bg-black border-4 ${finalRandom.border} shadow-[0_0_80px_rgba(0,0,0,0.8)] transition-all duration-300 scale-105`;
            
            // Explotar partículas
            fireParticles(colorHexMap[finalRandom.color]);
            
            // Mostrar botón cerrar
            setTimeout(() => {
                closeBtn.classList.remove('opacity-0', 'pointer-events-none');
            }, 500);
        }

        // =================================================================================
        // TEMPORIZADOR NEON
        // =================================================================================
        function startTimer() {
            const modal = document.getElementById('timer-modal');
            const display = document.getElementById('timer-display');
            const progress = document.getElementById('timer-progress');
            
            modal.style.display = 'flex';
            setTimeout(() => modal.style.opacity = '1', 10);
            
            let timeLeft = currentTimerSeconds;
            display.innerText = timeLeft;
            progress.style.strokeDashoffset = '0';
            progress.style.transition = 'stroke-dashoffset 1s linear';
            
            const circumference = 2 * Math.PI * 110; // r=110 -> ~691

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                display.innerText = timeLeft;
                
                const offset = circumference - (timeLeft / currentTimerSeconds) * circumference;
                progress.style.strokeDashoffset = offset;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    SFX.playAlarm(); // Sonido de alarma
                    display.innerText = "¡TIEMPO!";
                    progress.style.transition = 'none';
                    progress.style.strokeDashoffset = '0';
                    progress.style.stroke = '#ff0055'; // Cambia a rojo al terminar
                }
            }, 1000);
        }

        function closeTimer() {
            clearInterval(timerInterval);
            const modal = document.getElementById('timer-modal');
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.style.display = 'none';
                document.getElementById('timer-progress').style.stroke = '#ffcc00'; // reset color
            }, 300);
        }

        function fireParticles(color) {
            const container = document.getElementById('particles-container');
            for(let i=0; i<40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = color;
                p.style.boxShadow = `0 0 10px ${color}`;
                p.style.left = '50%';
                p.style.top = '50%';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 80 + Math.random() * 200;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                p.style.setProperty('--tx', `${tx}px`);
                p.style.setProperty('--ty', `${ty}px`);
                container.appendChild(p);
            }
        }

        function closeModal() {
            const modal = document.getElementById('random-modal');
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.style.display = 'none';
                clearInterval(rouletteInterval);
                nextTurn(); // Avanza el turno automáticamente al cerrar el reto
            }, 300);
        }

        // =================================================================================
        // EXPORTACIÓN A PDF
        // =================================================================================
        function downloadPDF() {
            const btn = document.getElementById('download-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = "Procesando PDF... espera";

            const tempContainer = document.createElement('div');
            tempContainer.style.backgroundColor = '#050505';

            const redName = currentTheme === 'couples' ? 'Rojo: Spicy & Pasión' : 'Rojo: Beber & Tragos';
            const purpleName = currentTheme === 'couples' ? 'Morado: Pareja & Historia' : 'Morado: El Grupo & Salseo';

            const colors = [
                { id: 'rojo', name: redName, hex: '#ff0055' },
                { id: 'amarillo', name: 'Amarillo: Mental & Trivia', hex: '#ffcc00' },
                { id: 'verde', name: 'Verde: Acción & Diversión', hex: '#33ff00' },
                { id: 'azul', name: 'Azul: Confesiones', hex: '#00ccff' },
                { id: 'morado', name: purpleName, hex: '#cc00ff' },
                { id: 'rosa', name: 'Rosa: Sorpresas y Castigos', hex: '#ff00cc' }
            ];

            const pdfStyles = `
                <style>
                    .pdf-section { background-color: #050505 !important; padding: 60px 40px 40px 40px; box-sizing: border-box; width: 100%; min-height: 296mm; display: flex; flex-direction: column; }
                    .pdf-header { text-align: center; font-family: 'Orbitron', sans-serif; text-transform: uppercase; margin-bottom: 40px; padding-top: 10px; }
                    .pdf-item { padding: 18px; background: #111111 !important; border-radius: 8px; margin-bottom: 15px; border-left-width: 8px; border-left-style: solid; display: block; page-break-inside: avoid !important; break-inside: avoid !important; }
                    .pdf-num { font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 6px; display: block; }
                    .pdf-text { font-size: 15.5px; color: #eeeeee; margin: 0; font-family: 'Rajdhani', sans-serif; line-height: 1.4; }
                    .page-break { page-break-before: always !important; }
                </style>
            `;

            tempContainer.innerHTML = pdfStyles;

            colors.forEach((colorObj, index) => {
                const section = document.createElement('div');
                section.className = `pdf-section ${index > 0 ? 'page-break' : ''}`;
                const filtered = challenges.filter(c => c.color === colorObj.id);
                
                section.innerHTML = `
                    <div class="pdf-header">
                        <h1 style="color: ${colorObj.hex}; font-size: 34px; margin: 0; letter-spacing: 2px;">${colorObj.name}</h1>
                        <hr style="border: 0; border-top: 2px solid ${colorObj.hex}; margin-top: 15px; opacity: 0.4; width: 60%; margin-left: auto; margin-right: auto;">
                    </div>
                    <div style="display: flex; flex-direction: column;">
                        ${filtered.map((c, i) => `
                            <div class="pdf-item" style="border-left-color: ${colorObj.hex};">
                                <span class="pdf-num" style="color: ${colorObj.hex};">RETO #${i+1}</span>
                                <p class="pdf-text">${c.text}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
                tempContainer.appendChild(section);
            });

            const fallPage = document.createElement('div');
            fallPage.className = 'pdf-section page-break';
            fallPage.innerHTML = `
                <div class="pdf-header">
                    <h1 style="color: #ff0055; font-size: 34px; margin: 0; text-shadow: 0 0 10px #ff0055;">💥 SI LA TORRE CAE 💥</h1>
                    <hr style="border: 0; border-top: 2px solid #ff0055; margin-top: 15px; opacity: 0.5; width: 80%; margin-left: auto; margin-right: auto;">
                </div>
                <div style="display: flex; flex-direction: column;">
                    ${fallPenalties.map(c => `
                        <div class="pdf-item" style="border-left-color: ${c.hex}; margin-bottom: 20px;">
                            <span class="pdf-num" style="color: ${c.hex}; font-size: 14px;">${c.cat} - ${c.title}</span>
                            <p class="pdf-text" style="font-size: 17px; margin-top: 5px;">${c.text}</p>
                        </div>
                    `).join('')}
                </div>
            `;
            tempContainer.appendChild(fallPage);

            const opt = {
                margin:       0,
                filename:     `Jenga_Neon_${currentTheme === 'couples' ? 'Parejas' : 'Amigos'}_${isHardcore ? 'Hardcore' : 'Normal'}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, backgroundColor: '#050505', useCORS: true, scrollY: 0, scrollX: 0 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak:    { mode: ['css', 'legacy'] }
            };

            html2pdf().set(opt).from(tempContainer).save().then(() => {
                btn.innerHTML = originalText;
            });
        }

        // Inicializar
        updateData();
        renderPlayersInline(); // Iniciar UI de jugadores vacía
    </script>
</body>
</html>
